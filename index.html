<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K — Products, not code.</title>
<style>
  :root {
    --bg: #07080a;
    --text: #e8eaed;
    --dim: #5f6368;
    --blue: #669df6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    height: 100vh; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    color: var(--text);
  }

  .page {
    width: 100%; max-width: 1100px; padding: 0 80px;
    display: flex; flex-direction: column; gap: 80px;
  }

  /* ── TITLE ── */
  .title-block { position: relative; }
  .tag {
    font-size: 11px; font-weight: 600; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--blue);
    margin-bottom: 24px;
  }
  .headline {
    font-size: clamp(44px, 7vw, 80px);
    font-weight: 800; line-height: 1.02; letter-spacing: -0.025em;
    max-width: 900px;
  }
  .headline .hl {
    color: var(--blue);
    position: relative;
  }
  .headline .hl::after {
    content: '';
    position: absolute; bottom: -4px; left: 0; right: 0; height: 3px;
    background: var(--blue); opacity: 0; transition: opacity .3s;
  }
  .headline .hl.on::after { opacity: 1; }

  /* ── PIPELINE ── */
  .pipeline {
    display: flex; align-items: center; gap: 0;
  }
  .step {
    display: flex; align-items: center; gap: 0;
    opacity: 0.22; transition: opacity .6s;
  }
  .step.show { opacity: 1; }
  .step .box {
    width: 120px; height: 72px;
    border: 1px solid rgba(255,255,255,0.1);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px;
  }
  .step .box .label {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 13px; font-weight: 700; letter-spacing: 0.06em;
    color: rgba(255,255,255,0.5); transition: color .6s;
  }
  .step .box .name {
    font-size: 10px; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; color: rgba(255,255,255,0.2);
    transition: color .6s;
  }
  .step.show .box {
    border-color: rgba(255,255,255,0.25);
  }
  .step.show .box .label { color: #fff; }
  .step.show .box .name { color: rgba(255,255,255,0.5); }
  .step.show.current .box {
    border-color: var(--blue);
    background: rgba(102,157,246,0.06);
    box-shadow: 0 0 40px rgba(102,157,246,0.12);
  }
  .step.show.current .box .label { color: var(--blue); }
  .step.show.current .box .name { color: rgba(102,157,246,0.7); }

  .connector {
    width: 60px; height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 0 12px; transition: all .6s;
    position: relative;
  }
  .connector.done {
    background: rgba(255,255,255,0.25);
  }
  .connector.done::after {
    content: '';
    position: absolute; right: 0; top: -3px;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 0 8px rgba(102,157,246,0.6);
  }

  /* ── STATEMENT ── */
  .statement {
    font-size: clamp(16px, 2.2vw, 22px);
    font-weight: 600; letter-spacing: -0.01em;
    color: var(--dim); max-width: 650px; line-height: 1.5;
  }
  .statement span {
    color: rgba(255,255,255,0.6);
    transition: color 1.5s;
  }
  .statement span.revealed { color: #fff; }

  /* ── SOCIAL ── */
  .social {
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  .social a {
    display: flex; align-items: center; justify-content: center;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.25);
    transition: all .3s;
    position: relative;
  }
  .social a:hover {
    border-color: rgba(255,255,255,0.3);
    color: #fff;
    background: rgba(255,255,255,0.04);
    transform: translateY(-2px);
  }
  .social a svg {
    width: 18px; height: 18px;
    fill: none; stroke: currentColor;
    stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
  }
  .social .divider {
    width: 1px; height: 20px;
    background: rgba(255,255,255,0.06);
    margin: 0 4px;
  }

  @media (max-width: 768px) {
    .page { padding: 0 28px; gap: 48px; }
    .step .box { width: 68px; height: 52px; }
    .step .box .label { font-size: 11px; }
    .step .box .name { font-size: 8px; }
    .connector { width: 24px; margin: 0 4px; }
    .social { gap: 12px; }
    .social a { width: 36px; height: 36px; }
    .social a svg { width: 16px; height: 16px; }
  }
</style>
</head>
<body>

<div class="page">

  <div class="title-block">
    <div class="tag">Focus · AI-Native & Agent Products</div>
    <div class="headline">
      I don't just<br>create <span class="hl" id="hl">code</span>.
    </div>
  </div>

  <div class="pipeline" id="pipeline">
    <div class="step" data-id="0">
      <div class="box"><div class="label">BP</div><div class="name">Business Plan</div></div>
    </div>
    <div class="connector"><div></div></div>
    <div class="step" data-id="1">
      <div class="box"><div class="label">BRD</div><div class="name">Requirements</div></div>
    </div>
    <div class="connector"><div></div></div>
    <div class="step" data-id="2">
      <div class="box"><div class="label">R</div><div class="name">Research</div></div>
    </div>
    <div class="connector"><div></div></div>
    <div class="step" data-id="3">
      <div class="box"><div class="label">{ }</div><div class="name">Code</div></div>
    </div>
  </div>

  <div class="statement" id="statement">
    <span>Every repo ships as a complete commercial proposition.</span><br>
    <span>I create products & business models.</span>
  </div>

  <div class="social">
    <!-- Email -->
    <a href="mailto:k@superk.ai" title="Email">
      <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13 2 4"/></svg>
    </a>

    <!-- WeChat -->
    <a href="#" title="WeChat: KevPH" onclick="return false">
      <svg viewBox="0 0 24 24"><path d="M8.5 11a1.5 1.5 0 100-3 1.5 1.5 0 000 3zM15.5 11a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/><path d="M20 13c0 4.4-4 8-8 8-1 0-2-.2-2.8-.5L6 21.5l1-2.6C5.4 17.8 4 15.7 4 13c0-4.4 4-8 8-8s8 3.6 8 8z"/></svg>
    </a>

    <span class="divider"></span>

    <!-- Twitter/X -->
    <a href="https://x.com/" title="Twitter">
      <svg viewBox="0 0 24 24"><path d="M4 4l7.5 10L4 20h2l6-7 4.5 7H22l-8-10.5L20.5 4h-2l-5.5 6.5L9 4H4z"/></svg>
    </a>

    <!-- LinkedIn -->
    <a href="https://linkedin.com/in/" title="LinkedIn">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="18" rx="3"/><line x1="7" y1="9.5" x2="7" y2="17"/><line x1="11.5" y1="13" x2="11.5" y2="17"/><line x1="11.5" y1="9.5" x2="11.5" y2="11"/><circle cx="7" cy="6.5" r="1.5"/><path d="M14.5 17v-3.5a2 2 0 014 0V17"/></svg>
    </a>

    <!-- Facebook -->
    <a href="https://facebook.com/" title="Facebook">
      <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3V2z"/></svg>
    </a>

    <span class="divider"></span>

    <!-- WhatsApp -->
    <a href="https://wa.me/" title="WhatsApp">
      <svg viewBox="0 0 24 24"><path d="M3 21l1.65-4.85A9 9 0 013 12a9 9 0 1110.35 8.85L21 21l-4.85-1.65A9 9 0 013 21z"/><path d="M9 10a.5.5 0 01.5.5 2.5 2.5 0 002.5 2.5.5.5 0 010 1 3.5 3.5 0 01-3.5-3.5.5.5 0 01.5-.5z"/><path d="M9.5 10a2.5 2.5 0 015 0v2a.5.5 0 01-1 0v-2a1.5 1.5 0 00-3 0v2a.5.5 0 01-1 0v-2z"/><path d="M11.5 14.5v1a.5.5 0 001 0v-1a.5.5 0 00-1 0z"/></svg>
    </a>

    <!-- 抖音 -->
    <a href="https://douyin.com/" title="抖音">

    </a>

    <span class="divider"></span>

    <!-- 小红书 -->
    <a href="https://xiaohongshu.com/" title="小红书">

    </a>

    <span style="margin-left:auto;font-size:10px;letter-spacing:0.1em;color:rgba(255,255,255,0.12)">KevPH · Beijing</span>
  </div>

</div>

<script>
const steps = document.querySelectorAll('.step');
const connectors = document.querySelectorAll('.connector');
const hl = document.getElementById('hl');
const stmt = document.querySelectorAll('#statement span');
let idx = -1, dir = 1, paused = false;

function tick() {
  steps.forEach(s => { s.classList.remove('show','current'); });
  connectors.forEach(c => c.classList.remove('done'));

  for (let i = 0; i <= idx && i < steps.length; i++) {
    steps[i].classList.add('show');
    if (i < idx) connectors[i]?.classList.add('done');
  }
  if (idx >= 0 && idx < steps.length) {
    steps[idx].classList.add('current');
  }

  if (idx === steps.length - 1 && dir === 1) {
    hl.textContent = 'products';
    hl.classList.add('on');
    stmt.forEach(s => s.classList.add('revealed'));
    paused = true;
    setTimeout(() => {
      dir = -1; paused = false;
      hl.classList.remove('on');
      stmt.forEach(s => s.classList.remove('revealed'));
      tick();
    }, 2500);
    return;
  }

  if (idx <= 0 && dir === -1) {
    hl.textContent = 'code';
    dir = 1; idx = -1;
    setTimeout(tick, 500);
    return;
  }

  idx += dir;
  setTimeout(tick, dir === 1 ? 450 : 200);
}
tick();
</script>

</body>
</html>
