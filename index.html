<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K — Products, not code.</title>
<style>
  :root {
    --bg: #0a0c10;
    --blue: #4d9eff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080a0e;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    height: 100vh; width: 100vw;
    cursor: default;
  }

  /* ── TEXTURE LAYERS ── */
  .concrete {
    position: fixed; inset: 0; z-index: 9998; pointer-events: none;
    opacity: 0.06;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.55' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  .grain {
    position: fixed; inset: 0; z-index: 9997; pointer-events: none;
    opacity: 0.03;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  .vignette {
    position: fixed; inset: 0; z-index: 9996; pointer-events: none;
    background: radial-gradient(ellipse at 40% 35%, transparent 40%, rgba(8,10,14,0.85) 100%);
  }

  /* ── CANVAS ── */
  canvas { position: fixed; inset: 0; z-index: 1; }

  /* ── TITLE ── */
  .title-layer {
    position: fixed; inset: 0; z-index: 2;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none; text-align: center;
    padding: 40px 24px;
  }
  .title-main {
    font-size: clamp(40px, 8vw, 80px);
    font-weight: 900; letter-spacing: -0.03em;
    line-height: 1.05; text-transform: uppercase;
    color: #e8edf2;
    text-shadow: 0 2px 0 rgba(0,0,0,0.5), 0 0 80px rgba(77,158,255,0.25);
  }
  .title-main .hl {
    color: #4d9eff;
    text-shadow: 0 0 40px rgba(77,158,255,0.5), 0 0 100px rgba(77,158,255,0.2);
  }
  .title-sub {
    font-size: clamp(11px, 2vw, 15px);
    color: rgba(255,255,255,0.3); font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-top: 16px;
  }
  .reveal-line {
    font-size: clamp(13px, 2.5vw, 18px);
    font-weight: 700; letter-spacing: -0.01em;
    margin-top: 12px; opacity: 0; transform: translateY(8px);
    transition: all 0.9s cubic-bezier(.16,1,.3,1);
  }
  .reveal-line.on {
    opacity: 1; transform: translateY(0);
    color: #4d9eff;
    text-shadow: 0 0 30px rgba(77,158,255,0.5);
  }

  /* ── BOTTOM ── */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    padding: 14px 28px; display: flex; justify-content: center; gap: 32px;
    border-top: 1px solid rgba(255,255,255,0.04);
    background: linear-gradient(to top, rgba(8,10,14,0.95), transparent);
    pointer-events: all;
  }
  .bottom-bar a {
    font-size: 10px; color: rgba(255,255,255,0.25); text-decoration: none;
    text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600;
    transition: all .3s; padding: 4px 0;
    border-bottom: 1px solid transparent;
  }
  .bottom-bar a:hover { color: #fff; border-bottom-color: #4d9eff; }
  .bottom-bar span {
    font-size: 10px; color: rgba(255,255,255,0.08); letter-spacing: 0.1em;
  }

  @media (max-width: 640px) {
    .bottom-bar { gap: 14px; }
  }
</style>
</head>
<body>

<div class="concrete"></div>
<div class="grain"></div>
<div class="vignette"></div>

<canvas id="c"></canvas>

<div class="title-layer">
  <div class="title-main">PRODUCTS <span class="hl">NOT</span> CODE</div>
  <div class="title-sub">Every repo is a complete commercial proposition</div>
  <div class="reveal-line" id="reveal">I CREATE PRODUCTS & BUSINESS MODELS</div>
</div>

<div class="bottom-bar">
  <a href="https://github.com/KevPH2026">GitHub</a>
  <a href="https://kevph2026.github.io/VibeCut/">VibeCut</a>
  <a href="mailto:k@superk.ai">Email</a>
  <span>KevPH · Beijing</span>
</div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const reveal = document.getElementById('reveal');
let W, H, t = 0;

function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

let mx = W/2, my = H/2;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

const BLUE = '#4d9eff', VIOLET = '#8b5cf6', GREEN = '#3fb950', AMBER = '#d2991d';
const NODE_COLORS = [BLUE, VIOLET, AMBER, GREEN];
const NODE_LABELS = ['BP', 'BRD', 'R', 'C'];
const NODE_NAMES = ['Business Plan', 'Requirements', 'Research', 'Code'];

// ── GRID ──
function drawGrids() {
  const horizonY = H * 0.64;
  const mouseShift = (mx - W/2) * 0.02;

  // Far grid
  const farAlpha = 0.04;
  const farSize = 100;
  ctx.strokeStyle = `rgba(77,158,255,${farAlpha})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = ((mouseShift * 0.3) % farSize); x < W * 1.6; x += farSize) {
    ctx.moveTo(x, 0); ctx.lineTo(x + (x - W/2) * 0.5, H);
  }
  ctx.stroke();

  // Mid grid
  const midSize = 70;
  ctx.strokeStyle = 'rgba(77,158,255,0.07)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let x = ((mouseShift * 0.6) % midSize); x < W * 1.6; x += midSize) {
    ctx.moveTo(x, 0); ctx.lineTo(x + (x - W/2) * 0.65, H);
  }
  ctx.stroke();

  // Near grid - bold
  const nearSize = 50;
  ctx.strokeStyle = 'rgba(77,158,255,0.1)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let x = (mouseShift % nearSize); x < W * 1.6; x += nearSize) {
    ctx.moveTo(x, 0); ctx.lineTo(x + (x - W/2) * 0.8, H);
  }
  ctx.stroke();

  // Horizon line glow
  const hGrad = ctx.createLinearGradient(0, horizonY - 30, 0, horizonY + 60);
  hGrad.addColorStop(0, 'transparent');
  hGrad.addColorStop(0.4, 'rgba(77,158,255,0.05)');
  hGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = hGrad;
  ctx.fillRect(0, horizonY - 30, W, 90);

  // Horizon line
  ctx.strokeStyle = 'rgba(77,158,255,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, horizonY); ctx.lineTo(W, horizonY);
  ctx.stroke();

  return horizonY;
}

// ── LIGHT BEAMS FROM TOP-LEFT ──
function drawKeyLight() {
  const grad = ctx.createRadialGradient(W * 0.1, H * 0.05, 0, W * 0.1, H * 0.05, W * 1.2);
  grad.addColorStop(0, 'rgba(77,158,255,0.04)');
  grad.addColorStop(0.3, 'rgba(77,158,255,0.01)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Light shaft lines from top-left
  const lx = W * 0.08, ly = 0;
  for (let i = 0; i < 6; i++) {
    const angle = 0.3 + i * 0.15;
    const len = W * 1.5;
    const grad2 = ctx.createLinearGradient(lx, ly, lx + Math.cos(angle) * len, ly + Math.sin(angle) * len);
    grad2.addColorStop(0, 'rgba(77,158,255,0.04)');
    grad2.addColorStop(1, 'transparent');
    ctx.strokeStyle = grad2;
    ctx.lineWidth = 1 + i * 2;
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    ctx.lineTo(lx + Math.cos(angle) * len, ly + Math.sin(angle) * len);
    ctx.stroke();
  }
}

// ── NODE ──
function drawNode(x, y, w, h, color, label, active) {
  const a = active ? 1 : 0;
  const skew = 10;

  // Shadow (top-left)
  if (active) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.moveTo(x - w/2 + skew + 6, y - h/2 + 6);
    ctx.lineTo(x + w/2 + 6, y - h/2 + 6);
    ctx.lineTo(x + w/2 - skew + 6, y + h/2 + 6);
    ctx.lineTo(x - w/2 + 6, y + h/2 + 6);
    ctx.closePath();
    ctx.fill();
  }

  // Glow
  if (active) {
    const gr = ctx.createRadialGradient(x, y, w * 0.3, x, y, w * 1.8);
    gr.addColorStop(0, color + '30');
    gr.addColorStop(0.4, color + '0D');
    gr.addColorStop(1, 'transparent');
    ctx.fillStyle = gr;
    ctx.fillRect(x - w * 2, y - h * 2, w * 4, h * 4);
  }

  // Body
  ctx.beginPath();
  ctx.moveTo(x - w/2 + skew, y - h/2);
  ctx.lineTo(x + w/2, y - h/2);
  ctx.lineTo(x + w/2 - skew, y + h/2);
  ctx.lineTo(x - w/2, y + h/2);
  ctx.closePath();

  // Fill
  const fillAlpha = 0.04 + a * 0.18;
  ctx.fillStyle = color + Math.round(fillAlpha * 255).toString(16).padStart(2, '0');
  ctx.fill();

  // Border
  const borderAlpha = 0.2 + a * 0.8;
  ctx.strokeStyle = color + Math.round(borderAlpha * 255).toString(16).padStart(2, '0');
  ctx.lineWidth = active ? 2.5 : 1.5;
  if (active) {
    ctx.shadowColor = color;
    ctx.shadowBlur = 30;
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Top edge highlight
  ctx.strokeStyle = active ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x - w/2 + skew + 3, y - h/2 + 3);
  ctx.lineTo(x + w/2 - 3, y - h/2 + 3);
  ctx.stroke();

  // Label
  ctx.fillStyle = `rgba(255,255,255,${0.2 + a * 0.8})`;
  ctx.font = `bold ${16 + a * 3}px "SF Mono","Fira Code","Cascadia Code",monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y);

  // Sub label below
  if (active) {
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = '600 11px -apple-system,BlinkMacSystemFont,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(NODE_NAMES[NODE_LABELS.indexOf(label)], x, y + h/2 + 22);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.font = '500 9px -apple-system,BlinkMacSystemFont,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(NODE_NAMES[NODE_LABELS.indexOf(label)], x, y + h/2 + 22);
  }
}

// ── CONNECTION ──
function drawConnection(x1, y1, x2, y2, color, progress) {
  const dx = x2 - x1, dy = y2 - y1;

  // Base
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.stroke();

  // Active fill
  if (progress > 0) {
    const px = x1 + dx * progress, py = y1 + dy * progress;
    const grad = ctx.createLinearGradient(x1, y1, x2, y2);
    grad.addColorStop(0, color + '99');
    grad.addColorStop(0.6, color + '40');
    grad.addColorStop(1, 'transparent');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2.5;
    ctx.shadowColor = color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(x1, y1); ctx.lineTo(px, py);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Dot
    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(px, py, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Neon accent line above
    ctx.strokeStyle = color + '60';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(x1, y1 - 6);
    ctx.lineTo(px, py - 6);
    ctx.stroke();
  }
}

// ── PARTICLES ──
const particles = [];
for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * W, y: H + Math.random() * 100,
    vx: (Math.random() - 0.5) * 0.2,
    vy: -0.3 - Math.random() * 0.5,
    s: 0.5 + Math.random() * 2,
    life: Math.random(), maxLife: 0.5 + Math.random() * 0.5,
    c: NODE_COLORS[Math.floor(Math.random() * 4)]
  });
}
function updateParticles() {
  for (let p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.life += 0.0015;
    if (p.life > p.maxLife || p.y < -10) {
      p.x = Math.random() * W; p.y = H + 30;
      p.life = 0;
    }
  }
}
function drawParticles() {
  for (let p of particles) {
    const a = p.life < 0.15 ? p.life/0.15 : p.life > p.maxLife-0.15 ? (p.maxLife-p.life)/0.15 : 1;
    ctx.fillStyle = p.c + Math.round(a*80).toString(16).padStart(2,'0');
    ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
  }
}

// ── PIPELINE ANIMATION ──
const NODE_W = 84, NODE_H = 60, GAP = 120;
let activeNode = -1, connProgress = [0,0,0], phaseStart, cyclePhase = 0;
const FWD = 420, PAUSE = 2400, BWD = 280;
let lastReveal = 0;

// ── RENDER LOOP ──
function draw(now) {
  t = now * 0.001;
  if (!phaseStart) phaseStart = now;
  const elapsed = now - phaseStart;

  // Animation logic
  if (cyclePhase === 0) {
    activeNode = Math.min(3, Math.floor(elapsed / FWD));
    for (let i = 0; i < 3; i++) {
      if (i < activeNode) connProgress[i] = 1;
      else if (i === activeNode) connProgress[i] = Math.min(1, Math.max(0, (elapsed - i * FWD) / FWD));
    }
    if (activeNode >= 3 && elapsed > 3 * FWD + PAUSE) {
      cyclePhase = 1; phaseStart = now;
      if (now - lastReveal > 4000) { reveal.classList.remove('on'); lastReveal = now; }
    }
    if (activeNode === 3 && now - lastReveal > 5000) {
      reveal.classList.add('on'); lastReveal = now;
    }
  } else {
    const b = elapsed;
    activeNode = Math.max(-1, 3 - Math.floor(b / BWD));
    for (let i = 2; i >= 0; i--) {
      if (i > activeNode) connProgress[i] = 0;
      else if (i === activeNode) connProgress[i] = Math.max(0, 1 - (b - (3-activeNode-1)*BWD) / BWD);
      else connProgress[i] = 0;
    }
    if (activeNode < 0 && elapsed > 4 * BWD + 500) {
      cyclePhase = 0; phaseStart = now;
      activeNode = -1; connProgress = [0,0,0];
    }
  }

  // Clear
  ctx.clearRect(0, 0, W, H);
  const bgGrad = ctx.createRadialGradient(W*0.35, H*0.3, 0, W*0.35, H*0.3, W*1.1);
  bgGrad.addColorStop(0, '#0f1620');
  bgGrad.addColorStop(1, '#080a0e');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  drawKeyLight();
  const horizonY = drawGrids();

  // Pipeline position: centered on horizon
  const totalW = NODE_W * 4 + GAP * 3;
  const startX = W/2 - totalW/2 + NODE_W/2;
  const pipeY = horizonY - 60;

  // Connections
  for (let i = 0; i < 3; i++) {
    const x1 = startX + i * (NODE_W + GAP) + NODE_W/2;
    const x2 = startX + (i+1) * (NODE_W + GAP) - NODE_W/2;
    drawConnection(x1, pipeY, x2, pipeY, NODE_COLORS[i], connProgress[i]);
  }

  // Nodes
  for (let i = 0; i < 4; i++) {
    drawNode(startX + i * (NODE_W + GAP), pipeY, NODE_W, NODE_H, NODE_COLORS[i], NODE_LABELS[i], i === activeNode);
  }

  updateParticles();
  drawParticles();

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
