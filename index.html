<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K — Products, not code.</title>
<style>
  :root {
    --bg: #080a0c;
    --blue: #4da6ff;
    --violet: #a371f7;
    --amber: #d2991d;
    --green: #3fb950;
    --grid: rgba(77,166,255,0.06);
    --concrete: #0d1014;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: #8b949e;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', sans-serif;
    overflow-x: hidden;
    cursor: default;
  }

  /* ── Concrete texture overlay ── */
  .texture {
    position: fixed; inset: 0; z-index: 9998; pointer-events: none; opacity: 0.04;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* ── Scanlines ── */
  .scanlines {
    position: fixed; inset: 0; z-index: 9997; pointer-events: none; opacity: 0.03;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.3) 2px, rgba(0,0,0,0.3) 4px);
  }

  /* ── GRID FLOOR ── */
  .grid-floor {
    position: fixed; bottom: 0; left: 0; right: 0; height: 40vh; z-index: 0;
    perspective: 600px; overflow: hidden; pointer-events: none;
  }
  .grid-floor-inner {
    position: absolute; bottom: -60%; left: 50%; transform: translateX(-50%) rotateX(60deg);
    width: 200vw; height: 200vw;
    background-image:
      linear-gradient(rgba(77,166,255,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(77,166,255,0.08) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridPulse 4s ease-in-out infinite;
    mask-image: linear-gradient(to top, rgba(0,0,0,0.4) 0%, transparent 100%);
  }
  @keyframes gridPulse {
    0%, 100% { opacity: 0.6; background-size: 60px 60px; }
    50% { opacity: 1; background-size: 62px 62px; }
  }

  /* ── FLOATING PARTICLES ── */
  .particles {
    position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--blue);
    border-radius: 50%;
    animation: floatUp linear infinite;
    opacity: 0;
  }
  @keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.2; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }

  /* ── HERO ── */
  .hero {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; z-index: 2; padding: 60px 24px; text-align: center;
  }

  /* TITLE */
  .title-block { position: relative; z-index: 2; margin-bottom: 48px; }
  .title-line {
    font-size: clamp(36px, 7vw, 68px);
    font-weight: 900; color: #e6edf3;
    letter-spacing: -0.03em; line-height: 1.05;
    text-transform: uppercase;
  }
  .title-line mark {
    background: none; color: transparent;
    -webkit-text-stroke: 1px var(--blue);
    transition: all .8s;
  }
  .title-line mark.glow {
    -webkit-text-stroke: 0;
    background: linear-gradient(135deg, var(--blue), var(--violet));
    -webkit-background-clip: text;
    filter: drop-shadow(0 0 18px rgba(77,166,255,0.5));
  }
  .title-sub {
    font-size: clamp(14px, 2.5vw, 18px);
    color: #484f58; font-weight: 500; margin-top: 12px;
    letter-spacing: 0.06em; text-transform: uppercase;
  }

  /* ── PIPELINE ── */
  .pipeline {
    display: flex; align-items: center; justify-content: center;
    gap: 0; position: relative; z-index: 2;
  }
  .p-node {
    display: flex; flex-direction: column; align-items: center;
    width: 110px; position: relative;
    transition: transform .4s cubic-bezier(.34,1.56,.64,1);
  }
  .p-node .box {
    width: 64px; height: 64px;
    border: 2px solid rgba(77,166,255,0.15);
    background: rgba(77,166,255,0.03);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 800; letter-spacing: 0.03em;
    color: rgba(77,166,255,0.3);
    position: relative;
    transition: all .6s;
    clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
  }
  .p-node .box::after {
    content: '';
    position: absolute; inset: -2px;
    clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
    opacity: 0; transition: opacity .6s;
  }
  .p-node .label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; margin-top: 12px;
    color: rgba(77,166,255,0.2); transition: color .6s;
  }
  .p-node .sublabel {
    font-size: 9px; color: #21262d; text-transform: uppercase;
    letter-spacing: 0.06em; margin-top: 2px; transition: color .6s;
  }

  /* Connector lines */
  .p-connector {
    width: 48px; height: 2px;
    background: rgba(77,166,255,0.08);
    position: relative; top: -12px; margin: 0 -4px;
    transition: all .6s;
  }
  .p-connector::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, var(--blue), var(--violet));
    opacity: 0; transition: opacity .6s;
  }

  /* Active states */
  .p-node.active .box {
    border-color: var(--blue);
    background: rgba(77,166,255,0.1);
    color: var(--blue);
    box-shadow: 0 0 30px rgba(77,166,255,0.3), inset 0 0 20px rgba(77,166,255,0.05);
  }
  .p-node.active .label { color: var(--blue); }
  .p-node.active .sublabel { color: #484f58; }
  .p-node.active + .p-connector::after,
  .p-connector.active::after { opacity: 1; }

  /* Code node special */
  .p-node.code-node .box {
    border-color: rgba(63,185,80,0.2);
    color: rgba(63,185,80,0.3);
  }
  .p-node.code-node.active .box {
    border-color: var(--green);
    color: var(--green);
    box-shadow: 0 0 30px rgba(63,185,80,0.3), inset 0 0 20px rgba(63,185,80,0.05);
  }
  .p-node.code-node.active .label { color: var(--green); }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 10; padding: 16px 24px;
    display: flex; justify-content: center; gap: 20px;
    border-top: 1px solid rgba(77,166,255,0.06);
    background: rgba(8,10,12,0.8); backdrop-filter: blur(8px);
  }
  .bottom-bar a {
    font-size: 11px; color: #484f58; text-decoration: none;
    text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;
    transition: color .3s; padding: 4px 0;
    border-bottom: 1px solid transparent;
  }
  .bottom-bar a:hover { color: var(--blue); border-bottom-color: var(--blue); }

  /* ── AMBIENT GLOW ── */
  .ambient {
    position: fixed; z-index: 0; pointer-events: none;
    width: 600px; height: 600px; border-radius: 50%;
    filter: blur(120px); opacity: 0.08;
  }
  .ambient.a1 {
    top: -200px; left: -100px;
    background: var(--blue);
    animation: ambientDrift 8s ease-in-out infinite;
  }
  .ambient.a2 {
    bottom: -200px; right: -100px;
    background: var(--violet);
    animation: ambientDrift 10s ease-in-out infinite reverse;
  }
  @keyframes ambientDrift {
    0%, 100% { transform: translate(0, 0); }
    33% { transform: translate(40px, -30px); }
    66% { transform: translate(-20px, 20px); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .pipeline { flex-wrap: wrap; gap: 8px; }
    .p-node { width: 70px; }
    .p-node .box { width: 44px; height: 44px; font-size: 11px; }
    .p-connector { display: none; }
    .bottom-bar { gap: 12px; }
    .bottom-bar a { font-size: 10px; }
  }
</style>
</head>
<body>

<div class="texture"></div>
<div class="scanlines"></div>
<div class="grid-floor"><div class="grid-floor-inner"></div></div>

<div class="ambient a1"></div>
<div class="ambient a2"></div>

<div class="particles" id="particles"></div>

<div class="hero">
  <div class="title-block">
    <div class="title-line">I DON'T JUST</div>
    <div class="title-line">CREATE <mark id="titleMark">CODE</mark></div>
    <div class="title-sub">Every repo ships as a complete commercial proposition</div>
  </div>

  <div class="pipeline" id="pipeline">
    <div class="p-node" data-id="0">
      <div class="box">BP</div>
      <div class="label">Business Plan</div>
      <div class="sublabel">Strategy</div>
    </div>
    <div class="p-connector"></div>
    <div class="p-node" data-id="1">
      <div class="box">BRD</div>
      <div class="label">Requirements</div>
      <div class="sublabel">Spec</div>
    </div>
    <div class="p-connector"></div>
    <div class="p-node" data-id="2">
      <div class="box">R</div>
      <div class="label">Research</div>
      <div class="sublabel">Deep Dive</div>
    </div>
    <div class="p-connector"></div>
    <div class="p-node code-node" data-id="3">
      <div class="box">{ }</div>
      <div class="label">Code</div>
      <div class="sublabel">Execution</div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <a href="https://github.com/KevPH2026">GitHub</a>
  <a href="https://kevph2026.github.io/VibeCut/">VibeCut</a>
  <a href="mailto:k@superk.ai">Email</a>
  <span style="font-size:10px;color:#21262d;letter-spacing:0.06em">KevPH · Beijing</span>
</div>

<script>
// ── Pipeline animation ──
const nodes = document.querySelectorAll('.p-node');
const connectors = document.querySelectorAll('.p-connector');
const titleMark = document.getElementById('titleMark');
let activeIndex = -1;
let direction = 1;

function animatePipeline() {
  // Deactivate all
  nodes.forEach(n => n.classList.remove('active'));
  connectors.forEach(c => c.classList.remove('active'));

  // Activate current
  if (activeIndex >= 0 && activeIndex < nodes.length) {
    nodes[activeIndex].classList.add('active');
    if (activeIndex > 0) connectors[activeIndex - 1].classList.add('active');
  }

  // Last node triggers title change
  if (activeIndex === nodes.length - 1) {
    titleMark.textContent = 'PRODUCTS';
    titleMark.classList.add('glow');
  }

  activeIndex += direction;
  if (activeIndex >= nodes.length) {
    direction = -1;
    activeIndex = nodes.length - 1;
    // Pause at full pipeline
    setTimeout(() => {
      titleMark.textContent = 'CODE';
      titleMark.classList.remove('glow');
      animatePipeline();
    }, 1500);
    return;
  }
  if (activeIndex < 0) {
    direction = 1;
    activeIndex = 0;
    titleMark.textContent = 'CODE';
    titleMark.classList.remove('glow');
    setTimeout(animatePipeline, 600);
    return;
  }

  setTimeout(animatePipeline, 400);
}

animatePipeline();

// ── Particles ──
const container = document.getElementById('particles');
for (let i = 0; i < 40; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = (6 + Math.random() * 12) + 's';
  p.style.animationDelay = Math.random() * 10 + 's';
  p.style.width = (1 + Math.random() * 2) + 'px';
  p.style.height = p.style.width;
  if (Math.random() > 0.7) p.style.background = '#a371f7';
  container.appendChild(p);
}

// ── Parallax grid on mouse ──
document.addEventListener('mousemove', e => {
  const x = (e.clientX / window.innerWidth - 0.5) * 10;
  const y = (e.clientY / window.innerHeight - 0.5) * 10;
  document.querySelector('.grid-floor-inner').style.transform =
    `translateX(calc(-50% + ${x}px)) rotateX(60deg) translateY(${y}px)`;
  document.querySelectorAll('.ambient').forEach((a, i) => {
    a.style.transform = `translate(${x * (i+1) * 2}px, ${y * (i+1) * 2}px)`;
  });
});
</script>
</body>
</html>
