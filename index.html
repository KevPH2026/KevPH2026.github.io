<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K — Products, not code.</title>
<style>
  :root {
    --bg: #06080a;
    --blue: #4da6ff;
    --violet: #a371f7;
    --green: #3fb950;
    --amber: #d2991d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: #8b949e;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', sans-serif;
    overflow-x: hidden;
    cursor: default;
  }

  /* ── CONCRETE TEXTURE ── */
  .texture {
    position: fixed; inset: 0; z-index: 9998; pointer-events: none; opacity: 0.05;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* ── SCANLINES ── */
  .scanlines {
    position: fixed; inset: 0; z-index: 9997; pointer-events: none; opacity: 0.04;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.4) 2px, rgba(0,0,0,0.4) 4px);
  }

  /* ── GRID FLOOR ── */
  .grid-floor {
    position: fixed; bottom: 0; left: 0; right: 0; height: 50vh; z-index: 0;
    perspective: 500px; overflow: hidden; pointer-events: none;
  }
  .grid-floor-inner {
    position: absolute; bottom: -70%; left: 50%;
    transform: translateX(-50%) rotateX(55deg);
    width: 220vw; height: 220vw;
    background-image:
      linear-gradient(rgba(77,166,255,0.1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(77,166,255,0.1) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridBreath 5s ease-in-out infinite;
    mask-image: linear-gradient(to top, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.1) 50%, transparent 100%);
  }
  @keyframes gridBreath {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 0.9; }
  }

  /* ── PARTICLES ── */
  .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
  .particle {
    position: absolute; border-radius: 50%;
    animation: floatUp linear infinite; opacity: 0;
  }
  @keyframes floatUp {
    0% { transform: translateY(105vh) scale(0); opacity: 0; }
    15% { opacity: 0.9; }
    85% { opacity: 0.1; }
    100% { transform: translateY(-5vh) scale(2); opacity: 0; }
  }

  /* ── AMBIENT GLOW ── */
  .ambient {
    position: fixed; z-index: 0; pointer-events: none;
    border-radius: 50%; filter: blur(140px); opacity: 0.07;
  }
  .ambient.a1 { width: 700px; height: 700px; top: -250px; left: -150px; background: var(--blue); }
  .ambient.a2 { width: 500px; height: 500px; bottom: -200px; right: -100px; background: var(--violet); }

  /* ── HERO ── */
  .hero {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; z-index: 2; padding: 60px 24px; text-align: center;
  }

  /* ── TITLE ── */
  .title-block { position: relative; z-index: 2; margin-bottom: 56px; }
  .title-line {
    font-size: clamp(34px, 6.5vw, 64px);
    font-weight: 900;
    letter-spacing: -0.03em; line-height: 1.08;
    text-transform: uppercase;
    color: #c9d1d9;
  }
  .title-line .static { color: #c9d1d9; }
  .title-line .glow-word {
    background: linear-gradient(135deg, var(--blue), var(--violet));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px rgba(77,166,255,0.4));
    animation: titleGlow 3s ease-in-out infinite;
  }
  @keyframes titleGlow {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(77,166,255,0.4)); }
    50% { filter: drop-shadow(0 0 40px rgba(163,113,247,0.6)); }
  }
  .title-sub {
    font-size: clamp(13px, 2.2vw, 17px);
    color: #484f58; font-weight: 500; margin-top: 14px;
    letter-spacing: 0.05em; text-transform: uppercase;
  }

  /* ── REVEAL TAGLINE ── */
  .reveal-tag {
    font-size: clamp(16px, 3vw, 24px);
    font-weight: 700; color: transparent;
    letter-spacing: -0.01em;
    margin-top: 20px; height: 0; overflow: hidden;
    opacity: 0; transform: translateY(10px);
    transition: all .8s cubic-bezier(.16,1,.3,1);
  }
  .reveal-tag.show {
    height: auto; opacity: 1; transform: translateY(0);
    background: linear-gradient(135deg, var(--green), var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 24px rgba(63,185,80,0.4));
  }

  /* ── PIPELINE ── */
  .pipeline {
    display: flex; align-items: center; justify-content: center;
    gap: 0; position: relative; z-index: 2;
  }
  .p-node {
    display: flex; flex-direction: column; align-items: center;
    width: 120px; position: relative;
    transition: transform .5s cubic-bezier(.34,1.56,.64,1);
  }
  .p-node .box {
    width: 72px; height: 72px;
    border: 2px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.02);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 800; letter-spacing: 0.03em;
    color: rgba(255,255,255,0.15);
    position: relative;
    clip-path: polygon(12% 0%, 100% 0%, 88% 100%, 0% 100%);
    transition: all .5s cubic-bezier(.16,1,.3,1);
  }
  .p-node .box::before {
    content: '';
    position: absolute; inset: -3px;
    clip-path: polygon(12% 0%, 100% 0%, 88% 100%, 0% 100%);
    background: transparent; z-index: -1; transition: all .5s;
  }
  .p-node .glow-ring {
    position: absolute; inset: -8px;
    clip-path: polygon(12% 0%, 100% 0%, 88% 100%, 0% 100%);
    opacity: 0; transition: opacity .5s;
  }
  .p-node .label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; margin-top: 14px;
    color: rgba(255,255,255,0.12); transition: color .5s;
  }
  .p-node .sublabel {
    font-size: 9px; color: rgba(255,255,255,0.05);
    text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px;
    transition: color .5s;
  }

  .p-connector {
    width: 56px; height: 2px;
    background: rgba(255,255,255,0.04);
    position: relative; top: -16px; margin: 0 -6px;
    transition: all .5s;
  }
  .p-connector .fill {
    position: absolute; inset: 0; transform: scaleX(0); transform-origin: left;
    transition: transform .5s cubic-bezier(.16,1,.3,1);
  }

  /* Node colors */
  .pn-bp .glow-ring { background: rgba(77,166,255,0.2); }
  .pn-bp .fill { background: linear-gradient(90deg, var(--blue), transparent); }
  .pn-brd .glow-ring { background: rgba(163,113,247,0.2); }
  .pn-brd .fill { background: linear-gradient(90deg, var(--violet), transparent); }
  .pn-r .glow-ring { background: rgba(210,153,29,0.2); }
  .pn-r .fill { background: linear-gradient(90deg, var(--amber), transparent); }
  .pn-code .glow-ring { background: rgba(63,185,80,0.2); }
  .pn-code .fill { background: linear-gradient(90deg, var(--green), transparent); }

  /* Active */
  .p-node.active { transform: translateY(-4px); }
  .p-node.active .box { color: #fff; }
  .p-node.active .glow-ring { opacity: 1; }
  .p-node.active .label { color: rgba(255,255,255,0.8); }
  .p-node.active .sublabel { color: rgba(255,255,255,0.35); }
  .p-node.pn-bp.active .box { border-color: var(--blue); background: rgba(77,166,255,0.12); box-shadow: 0 0 40px rgba(77,166,255,0.35), 0 0 80px rgba(77,166,255,0.1); }
  .p-node.pn-brd.active .box { border-color: var(--violet); background: rgba(163,113,247,0.12); box-shadow: 0 0 40px rgba(163,113,247,0.35), 0 0 80px rgba(163,113,247,0.1); }
  .p-node.pn-r.active .box { border-color: var(--amber); background: rgba(210,153,29,0.12); box-shadow: 0 0 40px rgba(210,153,29,0.35), 0 0 80px rgba(210,153,29,0.1); }
  .p-node.pn-code.active .box { border-color: var(--green); background: rgba(63,185,80,0.12); box-shadow: 0 0 40px rgba(63,185,80,0.35), 0 0 80px rgba(63,185,80,0.1); }

  .p-connector.active .fill { transform: scaleX(1); }

  /* ── BOTTOM ── */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    padding: 14px 24px; display: flex; justify-content: center; gap: 24px;
    border-top: 1px solid rgba(255,255,255,0.04);
    background: rgba(6,8,10,0.85); backdrop-filter: blur(10px);
  }
  .bottom-bar a {
    font-size: 10px; color: #484f58; text-decoration: none;
    text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;
    transition: color .3s; padding: 4px 0;
    border-bottom: 1px solid transparent;
  }
  .bottom-bar a:hover { color: #c9d1d9; border-bottom-color: var(--blue); }
  .bottom-bar .loc {
    font-size: 10px; color: #21262d; letter-spacing: 0.08em; margin-left: 8px;
  }

  /* ── CORNER ACCENT ── */
  .corner {
    position: fixed; z-index: 3; pointer-events: none;
    width: 80px; height: 80px; opacity: 0.15;
  }
  .corner.tl { top: 20px; left: 20px; border-top: 2px solid var(--blue); border-left: 2px solid var(--blue); }
  .corner.br { bottom: 60px; right: 20px; border-bottom: 2px solid var(--violet); border-right: 2px solid var(--violet); }

  @media (max-width: 640px) {
    .p-node { width: 72px; }
    .p-node .box { width: 48px; height: 48px; font-size: 12px; }
    .p-connector { width: 20px; }
    .bottom-bar { gap: 12px; }
    .corner { width: 40px; height: 40px; }
  }
</style>
</head>
<body>

<div class="texture"></div>
<div class="scanlines"></div>
<div class="grid-floor"><div class="grid-floor-inner"></div></div>

<div class="ambient a1"></div>
<div class="ambient a2"></div>
<div class="corner tl"></div>
<div class="corner br"></div>

<div class="particles" id="particles"></div>

<div class="hero">
  <div class="title-block">
    <div class="title-line">
      <span class="static">I DON'T JUST CREATE</span><br>
      <span class="glow-word">CODE</span>
    </div>
    <div class="title-sub">Every repo is a complete commercial proposition</div>
    <div class="reveal-tag" id="revealTag">I CREATE PRODUCTS & BUSINESS MODELS</div>
  </div>

  <div class="pipeline" id="pipeline">
    <div class="p-node pn-bp" data-id="0">
      <div class="glow-ring"></div>
      <div class="box">BP</div>
      <div class="label">Business Plan</div>
      <div class="sublabel">Strategy</div>
    </div>
    <div class="p-connector"><div class="fill"></div></div>
    <div class="p-node pn-brd" data-id="1">
      <div class="glow-ring"></div>
      <div class="box">BRD</div>
      <div class="label">Requirements</div>
      <div class="sublabel">Spec</div>
    </div>
    <div class="p-connector"><div class="fill"></div></div>
    <div class="p-node pn-r" data-id="2">
      <div class="glow-ring"></div>
      <div class="box">R</div>
      <div class="label">Research</div>
      <div class="sublabel">Deep Dive</div>
    </div>
    <div class="p-connector"><div class="fill"></div></div>
    <div class="p-node pn-code" data-id="3">
      <div class="glow-ring"></div>
      <div class="box">{ }</div>
      <div class="label">Code</div>
      <div class="sublabel">Execution</div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <a href="https://github.com/KevPH2026">GitHub</a>
  <a href="https://kevph2026.github.io/VibeCut/">VibeCut</a>
  <a href="mailto:k@superk.ai">Email</a>
  <span class="loc">KevPH · Beijing</span>
</div>

<script>
const nodes = document.querySelectorAll('.p-node');
const connectors = document.querySelectorAll('.p-connector');
const revealTag = document.getElementById('revealTag');
let activeIndex = -1;
let direction = 1;
let paused = false;

function pulse() {
  if (paused) return;

  nodes.forEach(n => n.classList.remove('active'));
  connectors.forEach(c => c.classList.remove('active'));

  if (activeIndex >= 0 && activeIndex < nodes.length) {
    nodes[activeIndex].classList.add('active');
    if (activeIndex > 0) connectors[activeIndex - 1].classList.add('active');
  }

  if (activeIndex === nodes.length - 1) {
    revealTag.classList.add('show');
    paused = true;
    setTimeout(() => {
      revealTag.classList.remove('show');
      direction = -1;
      paused = false;
      activeIndex = nodes.length - 1;
      pulse();
    }, 2000);
    return;
  }

  if (activeIndex < 0 && direction === -1) {
    direction = 1;
    activeIndex = 0;
    setTimeout(pulse, 500);
    return;
  }

  activeIndex += direction;
  setTimeout(pulse, direction === 1 ? 350 : 250);
}

pulse();

// ── Particles ──
const pc = document.getElementById('particles');
for (let i = 0; i < 50; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = (5 + Math.random() * 15) + 's';
  p.style.animationDelay = Math.random() * 12 + 's';
  const s = 1 + Math.random() * 2.5;
  p.style.width = s + 'px'; p.style.height = s + 'px';
  const colors = ['#4da6ff','#a371f7','#3fb950','#d2991d'];
  p.style.background = colors[Math.floor(Math.random() * colors.length)];
  pc.appendChild(p);
}

// ── Mouse parallax ──
document.addEventListener('mousemove', e => {
  const x = (e.clientX / window.innerWidth - 0.5) * 15;
  const y = (e.clientY / window.innerHeight - 0.5) * 15;
  document.querySelector('.grid-floor-inner').style.transform =
    `translateX(calc(-50% + ${x}px)) rotateX(55deg) translateY(${y * 0.5}px)`;
  document.querySelectorAll('.ambient').forEach((a, i) => {
    a.style.transform = `translate(${x * (i+1)}px, ${y * (i+1)}px)`;
  });
});
</script>

</body>
</html>
